[include mainsail.cfg]
#[include print_area_bed_mesh.cfg]
[include KAMP_Settings.cfg]

[display_status] 

[mcu]
canbus_uuid: 4d771ed572a4						# Insert the CANbus-UUID of your Manta from the firmware flashing steps
canbus_interface: can0

[mcu EBBCan]
#serial: /dev/serial/by-id/usb-katapult_stm32h723xx_2D002C001751313434373135-if00
#/tmp/klipper_host_mcu
#canbus_uuid: 4d771ed572a4
#/dev/serial/by-id/usb-katapult_stm32h723xx_2D002C001751313434373135-if00
canbus_uuid: 1b5d79a71d0c ## OLD BURNED bf60c059f334 # Insert the CANbus-UUID of your SB2209 RP2040 from the firmware flashing steps

[printer]
kinematics: corexy
max_velocity: 300  
max_accel: 10000    			
max_z_velocity: 30 			
max_z_accel: 350
square_corner_velocity: 5.0

[temperature_sensor MCU]
sensor_type: temperature_mcu

[temperature_sensor SoC]
sensor_type: temperature_host

[temperature_sensor chamber]
sensor_type: Generic 3950
sensor_pin: PB0  # M8P TH1
min_temp: 0
max_temp: 100
gcode_id: chamber_th

[filament_switch_sensor switch_sensor]
switch_pin: ^PF0
pause_on_runout: False
runout_gcode:
  PAUSE # [pause_resume] is required in printer.cfg
  M117 Filament switch runout
insert_gcode:
  M117 Filament switch inserted

[filament_motion_sensor encoder_sensor]
switch_pin: ^PC15
detection_length: 2.88 # accuracy of motion sensor 2.88mm
extruder: extruder
pause_on_runout: False
runout_gcode:
  PAUSE # [pause_resume] is required in printer.cfg
  M117 Filament encoder runout
insert_gcode:
  M117 Filament encoder inserted

#####################################################################
# 	X/Y Stepper Settings
#####################################################################

## X Stepper on Motor1 (B Motor)
[stepper_x]
step_pin: PE6
dir_pin: PE5
enable_pin: !PC14
microsteps: 16
rotation_distance: 40
full_steps_per_rotation:200  #set to 400 for 0.9 degree stepper
endstop_pin: ^EBBCan:gpio24
position_min: 0
##	350mm build
position_endstop: 350
position_max: 350

homing_speed: 50  ###@@@25
homing_retract_dist: 5
homing_positive_dir: true

[tmc2209 stepper_x]
uart_pin: PC13
interpolate: True
run_current: 0.9 
sense_resistor: 0.110
stealthchop_threshold: 0

## Y Stepper on Motor2 (A Motor)
[stepper_y]
step_pin: PE2
dir_pin: PE1
enable_pin: !PE4
microsteps: 16
rotation_distance: 40
endstop_pin: ^PF3
full_steps_per_rotation:200  #set to 400 for 0.9 degree stepper
position_min: 0
## 350mm build
position_endstop: 355
position_max: 355

homing_speed: 50  ###@@@25
homing_retract_dist: 5
homing_positive_dir: true

[tmc2209 stepper_y]
uart_pin: PE3
interpolate: True
run_current: 0.9
sense_resistor: 0.110
stealthchop_threshold: 0


#####################################################################
# 	Z Stepper Settings
#####################################################################

## Z0 Stepper - Front Left on MOTOR3_A
[stepper_z]
step_pin: PB8
dir_pin: PB7
enable_pin: !PE0
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16
endstop_pin: probe:z_virtual_endstop
## 350mm build
position_max: 340

position_min: -5
homing_speed: 8
second_homing_speed: 3
homing_retract_dist: 3

[tmc2209 stepper_z]
uart_pin: PB9
interpolate: true
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

##	Z1 Stepper - Rear Left on Motor5
[stepper_z1]
step_pin: PB4
dir_pin: !PB3
enable_pin: !PB6
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16

[tmc2209 stepper_z1]
uart_pin: PB5
interpolate: true
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

##	Z2 Stepper - Rear Right on Motor6
[stepper_z2]
step_pin: PG13
dir_pin: PG12
enable_pin: !PG15
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16

[tmc2209 stepper_z2]
uart_pin: PG14
interpolate: true
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

##	Z3 Stepper - Front Right on Motor7
[stepper_z3]
step_pin: PG9
dir_pin: !PD7
enable_pin: !PG11
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16

[tmc2209 stepper_z3]
uart_pin: PG10
interpolate: true
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

#####################################################################
# 	Extruder
#####################################################################

#	E0 on SB2209
[extruder]
step_pin: EBBCan:gpio18  #18
dir_pin: EBBCan:gpio19  #19
enable_pin: !EBBCan:gpio17 #17
microsteps: 16
rotation_distance: 22.905740611
gear_ratio: 50:10
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: EBBCan:gpio7
#control: pid
min_temp: 0
max_extrude_only_distance: 105
max_extrude_cross_section: 5
#pid_kp: 57.369
#pid_ki: 2.533
#pid_kd: 324.854
sensor_type: MAX31865
sensor_pin: EBBCan:gpio9
spi_software_sclk_pin: EBBCan:gpio10
spi_software_mosi_pin: EBBCan:gpio8
spi_software_miso_pin: EBBCan:gpio11
rtd_nominal_r: 100
rtd_reference_r: 430
rtd_num_of_wires: 2
max_temp: 300
pressure_advance: 0.04

[tmc2209 extruder]
uart_pin: EBBCan:gpio20  #20
#uart_address: 3
run_current: 0.65
stealthchop_threshold: 999999


#####################################################################
# 	Bed Heater
#####################################################################

[heater_bed]
heater_pin: PA1
sensor_type: Generic 3950
sensor_pin: PB1
max_power: 1.0
min_temp: 0
max_temp: 115
#control: pid
#pid_kp: 58.437
#pid_ki: 2.347
#pid_kd: 363.769


#####################################################################
# 	Probe
#####################################################################

[probe]
pin: ^EBBCan:gpio22
x_offset: 0
y_offset: 0
#z_offset: 0
lift_speed: 30
activate_gcode:
    {% set PROBE_TEMP = 150 %}
    {% set MAX_TEMP = PROBE_TEMP + 5 %}
    {% set ACTUAL_TEMP = printer.extruder.temperature %}
    {% set TARGET_TEMP = printer.extruder.target %}

    {% if TARGET_TEMP > PROBE_TEMP %}
        { action_respond_info('Extruder temperature target of %.1fC is too high, lowering to %.1fC' % (TARGET_TEMP, PROBE_TEMP)) }
        M109 S{ PROBE_TEMP }
    {% else %}
        # Temperature target is already low enough, but nozzle may still be too hot.
        {% if ACTUAL_TEMP > MAX_TEMP %}
            { action_respond_info('Extruder temperature %.1fC is still too high, waiting until below %.1fC' % (ACTUAL_TEMP, MAX_TEMP)) }
            TEMPERATURE_WAIT SENSOR=extruder MAXIMUM={ MAX_TEMP }
        {% endif %}
    {% endif %}

#####################################################################
# 	Fan Control
#####################################################################

[fan]  # Parts fan - top one in Stealthburner
pin: EBBCan:gpio13       # SB2209 port 

[heater_fan hotend_fan]  ## Hotend fan - lower one in Stealthburner
pin: EBBCan:gpio14       # SB2209 port
heater: extruder
heater_temp: 70.0

[fan_generic nevermore]
##	Nevermore filter fans 
pin: PF8                      # FAN3 port Manta
kick_start_time: 0.5
off_below: 0.10

[controller_fan driver_fan]  # Fan directed at the motor drivers
pin: PF9                     # FAN 1 port Manta
max_power: 1.0               # Full speed
shutdown_speed: 0.0          # Turn off on Klipper emergency stop
kick_start_time: 0.5         # Helps the fan start spinning
stepper: stepper_x, stepper_y, stepper_z  #, extruder 
# The fan will run whenever any of the above motors are active.
idle_timeout: 30             # Stays on for 30 seconds after motors stop
idle_speed: 0.4              # Optional: Runs at 40% speed when idle but heaters are on

[heater_fan electronics_bay_fan] #	Skirts fan
pin: PF7                     # FAN 1 port Manta
kick_start_time: 0.5
heater: heater_bed
heater_temp: 70
fan_speed: 0.66

#[fan_generic exhaust_fan]     #	Exhaust fan -- not installed
#pin: PF6                      # FAN2 port Manta
#max_power: 1.0
#shutdown_speed: 0.0
#kick_start_time: 0.5

[temperature_fan SoC_fan]    # Fan for the Manta mcu and CB1 SoC
pin: PA4                     # FAN4 Manta M8p V2.0
sensor_type: temperature_host
min_temp: 10
max_temp: 70
target_temp: 45
control: watermark


#####################################################################
# 	LED Control
#####################################################################

[neopixel toolhead_light]
pin: EBBCan:gpio16
chain_count: 3
color_order: GRBW

[output_pin caselight]
#Chamber Lighting - HE3 Connector
pin: PA3
pwm:true
shutdown_value: 0
cycle_time: 0.01

