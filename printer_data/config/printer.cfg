	-60,-10
	410,420
#	Probe points
points:
	50,25
	50,275
	300,275
	300,25
# speed: 300

#--------------------------------------------------------------------
speed: 100
horizontal_move_z: 10
retries: 10
retry_tolerance: 0.0075
max_adjust: 10

# ORIGINAL [bed_mesh]
#mesh_min: 10,10
